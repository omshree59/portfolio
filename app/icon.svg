<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Geometric 'O' / Circle base -->
  <circle cx="20" cy="20" r="18" stroke="url(#icon-grad)" stroke-width="2.5" stroke-dasharray="80 20" filter="url(#glow)" />
  
  <!-- Stylized 'P' / Racing line -->
  <path d="M12 28V12H22C25.3137 12 28 14.6863 28 18C28 21.3137 25.3137 24 22 24H12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Acceleration Dots -->
  <circle cx="8" cy="20" r="1.5" fill="#22d3ee" />
  <circle cx="5" cy="20" r="1" fill="#22d3ee" opacity="0.5" />
</svg>
